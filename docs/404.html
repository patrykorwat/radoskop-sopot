<script>
  // Single Page Application (SPA) redirect
  // GitHub Pages will serve 404.html for any non-existent path
  // We use this to handle client-side routing
  const path = window.location.pathname;
  const search = '?p=' + encodeURIComponent(path);
  window.location.replace('/index.html' + search);
</script>
